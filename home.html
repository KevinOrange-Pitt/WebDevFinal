<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triv Crack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Logo / Title -->
        <h1 class="title">Trivia !!</h1>
        <p class="subtitle">Challenge your knowledge and compete with friends!</p>
        <p id="db-status" class="status">Checking server and database connection...</p>

        <!-- Menu Buttons -->
        <div class="menu">
            <button id="play-btn" class="btn">Play Game</button>
            <button id="leaderboard-btn" class="btn">Leaderboard</button>
            <button id="auth-btn" class="btn">Sign In / Create Account</button>
            <button id="settings-btn" class="btn secondary">Settings</button>
        </div>

        <!-- Footer -->
        <footer>
            <p>© 2026 TrivCrack</p>
        </footer>

    </div>

</body>
<script src="crack.js"></script>
</html>
