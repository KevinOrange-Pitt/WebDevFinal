<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Triv Crack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">

    <script>
    (function () {
    document.documentElement.classList.toggle(
    "dark",localStorage.getItem("theme") === "dark");
    })();
    </script>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h1 class="title">Welcome Back</h1>
            <p class="subtitle">Sign in or create your Triv Crack account.</p>

            <div class="tabs">
                <button id="show-signin" class="tab active">Sign In</button>
                <button id="show-signup" class="tab">Create Account</button>
            </div>

            <form id="signin-form" class="auth-form">
                <label>Email</label>
                <input type="email" id="signin-email" required>

                <label>Password</label>
                <input type="password" id="signin-password" required>

                <button type="submit" class="btn">Sign In</button>
            </form>

            <form id="signup-form" class="auth-form hidden">
                <label>Username</label>
                <input type="text" id="signup-username" minlength="2" required>

                <label>Email</label>
                <input type="email" id="signup-email" required>

                <label>Password (min 8 chars)</label>
                <input type="password" id="signup-password" minlength="8" required>

                <button type="submit" class="btn">Create Account</button>
            </form>

            <p id="auth-message" class="auth-message"></p>

            <a href="/home.html" class="back-link">Back to Home</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
