<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | Triv Crack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Leaderboard</h1>
        <p class="subtitle">This is your default leaderboard page. Add top players and scores from MongoDB here.</p>
        <table class="leaderboard">
            <thead>
                <tr>
                    <th scope="col">Rank</th>
                    <th scope="col">Player</th>
                    <th scope="col">Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="3">Loading...</td></tr>
               
            </tbody>
        </table>

        <div class="menu">
            <button class="btn" onclick="window.location.href='/home.html'">Back to Home</button>
        </div>
    </div>
    <script src="leaderboard.js"></script>
    
</body>
</html>
